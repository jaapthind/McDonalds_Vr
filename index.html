// -----------------------------------------------------------------------------------------
// VERTICAL SCALING OF PROCEDURAL GEOMETRY LOGIC
// -----------------------------------------------------------------------------------------

class StoreBuilder {
    constructor(scene) {
        this.scene = scene;
        this.entitiesList = [];
    }
    
    addBox(x, y, z, w, h, d, color, addPhys = false) {
        const el = document.createElement('a-box');
        
        el.setAttribute('position', `${x} ${y} ${z}`);
        el.setAttribute('width', `${w}`);
        el.setAttribute('height', `${h}`);
        el.setAttribute('depth', `${d}`);
        el.setAttribute('color', color);
        
        if(addPhys) {
            el.setAttribute('static-body', '');
        }
        
        this.scene.appendChild(el);
        this.entitiesList.push(el);
        
        return el;
    }
    
    addCylinder(x, y, z, r, h, color, rotX=0, rotY=0, rotZ=0) {
        const el = document.createElement('a-cylinder');
        
        el.setAttribute('position', `${x} ${y} ${z}`);
        el.setAttribute('radius', `${r}`);
        el.setAttribute('height', `${h}`);
        el.setAttribute('color', color);
        el.setAttribute('rotation', `${rotX} ${rotY} ${rotZ}`);
        
        this.scene.appendChild(el);
        this.entitiesList.push(el);
        
        return el;
    }
    
    addPlane(x, y, z, w, h, color, rotX=0, rotY=0, rotZ=0) {
        const el = document.createElement('a-plane');
        
        el.setAttribute('position', `${x} ${y} ${z}`);
        el.setAttribute('width', `${w}`);
        el.setAttribute('height', `${h}`);
        el.setAttribute('color', color);
        el.setAttribute('rotation', `${rotX} ${rotY} ${rotZ}`);
        
        this.scene.appendChild(el);
        this.entitiesList.push(el);
        
        return el;
    }
    
    buildFloor() {
        console.log("BUILDING FLOOR TILES...");
        
        const parent = document.createElement('a-entity');
        parent.setAttribute('id', 'store-floor');
        
        let counter = 0;
        
        for(let x = -10; x <= 10; x += 0.4) {
            for(let z = -14; z <= 6; z += 0.4) {
                
                const tile = document.createElement('a-plane');
                
                tile.setAttribute('position', `${x} 0 ${z}`);
                tile.setAttribute('rotation', '-90 0 0');
                tile.setAttribute('width', '0.38');
                tile.setAttribute('height', '0.38');
                
                const isRed = (Math.round(x/0.4) + Math.round(z/0.4)) % 2 === 0;
                
                if (isRed) {
                    tile.setAttribute('color', StoreConfig.materials.floorDark.color);
                } else {
                    tile.setAttribute('color', StoreConfig.materials.floorLight.color);
                }
                
                parent.appendChild(tile);
                counter++;
            }
        }
        
        this.scene.appendChild(parent);
        
        // Physics Floor
        const pFloor = document.createElement('a-plane');
        pFloor.setAttribute('position', '0 0 0');
        pFloor.setAttribute('rotation', '-90 0 0');
        pFloor.setAttribute('width', '100');
        pFloor.setAttribute('height', '100');
        pFloor.setAttribute('static-body', '');
        pFloor.setAttribute('visible', 'false');
        
        this.scene.appendChild(pFloor);
        
        console.log(`Generated ${counter} floor tiles.`);
    }
    
    buildCeiling() {
        console.log("BUILDING CEILING GRID...");
        
        const parent = document.createElement('a-entity');
        parent.setAttribute('id', 'store-ceiling');
        
        for(let x = -10; x <= 10; x += 1.2) {
            
            for(let z = -14; z <= 6; z += 1.2) {
                
                // Grid Frame X
                const frameX = document.createElement('a-box');
                frameX.setAttribute('position', `${x} 3.5 ${z+0.6}`);
                frameX.setAttribute('width', '1.2');
                frameX.setAttribute('height', '0.05');
                frameX.setAttribute('depth', '0.05');
                frameX.setAttribute('color', '#E0E0E0');
                
                parent.appendChild(frameX);
                
                // Grid Frame Z
                const frameZ = document.createElement('a-box');
                frameZ.setAttribute('position', `${x+0.6} 3.5 ${z}`);
                frameZ.setAttribute('width', '0.05');
                frameZ.setAttribute('height', '0.05');
                frameZ.setAttribute('depth', '1.2');
                frameZ.setAttribute('color', '#E0E0E0');
                
                parent.appendChild(frameZ);
                
                // Calculate properties
                const isLight = (Math.abs(Math.round(x/1.2)) % 2 === 0) && (Math.abs(Math.round(z/1.2)) % 2 === 0);
                const isVent = !isLight && (Math.abs(Math.round(x/1.2)) === 1) && (Math.abs(Math.round(z/1.2)) === 2);
                
                // Panel
                const panel = document.createElement('a-plane');
                panel.setAttribute('position', `${x+0.6} 3.52 ${z+0.6}`);
                panel.setAttribute('rotation', '90 0 0');
                panel.setAttribute('width', '1.15');
                panel.setAttribute('height', '1.15');
                
                if(isLight) {
                    
                    panel.setAttribute('color', '#FFFFFF');
                    panel.setAttribute('material', 'emissive: #FFF; emissiveIntensity: 0.8');
                    
                    const light = document.createElement('a-light');
                    light.setAttribute('type', 'point');
                    light.setAttribute('position', `${x+0.6} 3 ${z+0.6}`);
                    light.setAttribute('intensity', '0.4');
                    light.setAttribute('distance', '6');
                    light.setAttribute('color', '#FFFAFA');
                    
                    parent.appendChild(light);
                    
                } else if(isVent) {
                    
                    panel.setAttribute('color', '#AAAAAA');
                    
                    // Vent Slats
                    for(let v=0; v<5; v++) {
                        
                        const slat = document.createElement('a-box');
                        slat.setAttribute('position', `${x+0.6} 3.51 ${z+0.3 + (v*0.15)}`);
                        slat.setAttribute('width', '0.8');

                id="hand-left" 
                super-hands 
                hand-controls="hand: left" 
                sphere-collider="objects: .interactable"
                static-body="shape: sphere; sphereRadius: 0.05">
            </a-entity>
            
            <a-entity 
                id="hand-right" 
                super-hands 
                hand-controls="hand: right" 
                sphere-collider="objects: .interactable"
                static-body="shape: sphere; sphereRadius: 0.05">
            </a-entity>
        </a-entity>

        <!-- NOTE: The entire store geometry is dynamically constructed via the StoreBuilder class in JS to ensure extreme DOM scale and detail matching the user constraints. -->

    </a-scene>
