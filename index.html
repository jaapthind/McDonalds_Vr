/**
 * GAME STATE MANAGER
 */
const GameState = {
    money: 1540.50,
    timeOfDay: 43200, // 12:00 PM (Noon rush)
    weather: "sunny",
    orders: [],
    completedOrders: 0,
    wasteCost: 0,
    stations: {
        fryers: [
            { id: 1, temp: 330, targetTemp: 335, state: 'ready', basketL: null, basketR: null },
            { id: 2, temp: 335, targetTemp: 335, state: 'ready', basketL: null, basketR: null },
            { id: 3, temp: 330, targetTemp: 335, state: 'ready', basketL: null, basketR: null } // Hashbrown vat usually, but fries for noon rush
        ],
        grills: [
            { id: 1, platenL: { temp: 425, state: 'up', timer: 0 }, platenR: { temp: 425, state: 'up', timer: 0 } },
            { id: 2, platenL: { temp: 425, state: 'up', timer: 0 }, platenR: { temp: 425, state: 'up', timer: 0 } }
        ],
        uhc: {
            slots: [
                { item: 'patty_101', count: 8, expireTime: 1200 },
                { item: 'patty_41', count: 4, expireTime: 1200 },
                { item: 'nuggets', count: 20, expireTime: 1200 }
            ]
        }
    },
    init: function() {
        ENGINE.log("GameState Initialized.", "sys");
        this.generateInitialOrders();
        setInterval(() => this.tick(), 1000); // 1 tick per second
    },
    tick: function() {
        this.timeOfDay += 1;
        // Simulate order generation during rush hour
        if(Math.random() < 0.1 && this.orders.length < 10) {
            this.generateRandomOrder();
        }
        
        // Update physics and timers
        this.orders.forEach(o => o.timeElapsed++);
        
        // UHC decay
        this.stations.uhc.slots.forEach(slot => {
            if(slot.count > 0) slot.expireTime--;
            if(slot.expireTime <= 0) {
                ENGINE.log(`Waste recorded: ${slot.count}x ${slot.item}`, "warn");
                this.wasteCost += slot.count * 0.5;
                slot.count = 0;
            }
        });

        this.updateHUD();
    },
    generateInitialOrders: function() {
        for(let i=0; i<3; i++) this.generateRandomOrder();
    },
    generateRandomOrder: function() {
        const orderId = Math.floor(Math.random() * 900) + 100;
        const types = Object.keys(MenuDatabase.buildCards);
        const itemQty = Math.floor(Math.random() * 3) + 1;
        const items = [];
        for(let i=0; i<itemQty; i++) {
            items.push({
                name: types[Math.floor(Math.random() * types.length)],
                status: 'pending',
                mods: Math.random() > 0.8 ? ['No Onion'] : []
            });
        }
        // Add fries often
        if(Math.random() > 0.5) items.push({ name: "Medium Fries", status: 'pending', mods: [] });
        
        this.orders.push({
            id: orderId,
            type: Math.random() > 0.7 ? 'DINE-IN' : 'TAKE-OUT',
            items: items,
            timeElapsed: 0
        });
        
        ENGINE.log(`New Order Rung Up: #${orderId}`);
    },
    updateHUD: function() {
        // Update Time & Money
        const hours = Math.floor((this.timeOfDay / 3600) % 24);
        const mins = Math.floor((this.timeOfDay / 60) % 60);
        const ampm = hours >= 12 ? 'PM' : 'AM';
        const displayHours = hours % 12 === 0 ? 12 : hours % 12;
        const displayMins = mins < 10 ? '0'+mins : mins;
        
        document.getElementById('clock-display').textContent = `${displayHours}:${displayMins} ${ampm}`;
        document.getElementById('score-display').textContent = `Orders: ${this.completedOrders} | Waste: -$${this.wasteCost.toFixed(2)}`;

        // Update KVS
        const kvsContainer = document.getElementById('kvs-container');
        kvsContainer.innerHTML = '';
        this.orders.slice(0, 5).forEach(order => {
            const ticket = document.createElement('div');
            ticket.className = 'kvs-ticket';
            
            let headerClass = '';
            if(order.type === 'DINE-IN') headerClass = 'dine-in';
            else if(order.type === 'DELIVERY') headerClass = 'delivery';
            
            let bodyHTML = order.items.map(item => `
                <div class="kvs-item">
                    <div>1x ${item.name}</div>
                    ${item.mods.map(mod => `<div class="kvs-modifier">${mod}</div>`).join('')}
                </div>
            `).join('');

            const timeClass = order.timeElapsed > 120 ? 'warning' : ''; // 2 minute target

            ticket.innerHTML = `
                <div class="kvs-header ${headerClass}">
                    <span>#${order.id}</span>
                    <span>${order.type}</span>
                </div>
                <div class="kvs-body">${bodyHTML}</div>
                <div class="kvs-footer">
                    <div class="kvs-timer ${timeClass}">${order.timeElapsed}s</div>
                </div>
            `;
            kvsContainer.appendChild(ticket);
        });

        // Update Fry UI
        this.stations.fryers.forEach((fryer, index) => {
            const vTemp = document.getElementById(`vat-${index+1}-temp`);
            if(vTemp) {
                vTemp.textContent = `${fryer.temp}°F`;
                vTemp.className = `vat-temp ${fryer.temp < fryer.targetTemp - 5 ? 'cold' : 'hot'}`;
            }
        });
    }
};

/**
 * EXTREMELY DETAILED AI WORKER SYSTEM
 * Simulates pathfinding, task queuing, and inverse kinematics-lite representations
 */
class BotWorker {
    constructor(id, name, color, startPos, role) {
        this.id = id;
        this.name = name;
        this.role = role; // 'grill', 'fry', 'assemble', 'front'
        
        // State Machine
        this.state = 'idle';
        this.currentTask = null;
        this.taskQueue = [];
        this.inventory = null; // Item being held
        
        // Physics / Transforms
        this.position = { x: startPos[0], y: startPos[1], z: startPos[2] };
        this.targetPosition = null;
        this.rotation = 0;
        this.speed = 0.03; // m/tick

        this.el = this.createEntity(color);
        document.querySelector('a-scene').appendChild(this.el);
        ENGINE.log(`Bot initialized: ${name} (${role})`);
    }

    createEntity(color) {
        const bot = document.createElement('a-entity');
        bot.setAttribute('id', `bot-${this.id}`);
        bot.setAttribute('position', `${this.position.x} ${this.position.y} ${this.position.z}`);
        
        // Detailed geometry for bot
        const body = document.createElement('a-cylinder');
        body.setAttribute('radius', '0.25');
        body.setAttribute('height', '1.4');
        body.setAttribute('color', '#111');
        bot.appendChild(body);
        
        const head = document.createElement('a-sphere');
        head.setAttribute('radius', '0.2');
        head.setAttribute('position', '0 0.9 0');
        head.setAttribute('color', '#E8DCC4');
        bot.appendChild(head);

        const hat = document.createElement('a-cylinder');
        hat.setAttribute('radius', '0.21');
        hat.setAttribute('height', '0.1');
        hat.setAttribute('position', '0 1.05 0');
        hat.setAttribute('color', '#27251F');
        
        const hatBrim = document.createElement('a-cylinder');
        hatBrim.setAttribute('radius', '0.3');
        hatBrim.setAttribute('height', '0.02');
        hatBrim.setAttribute('position', '0 1.0 0.1');
        hatBrim.setAttribute('color', '#27251F');
        bot.appendChild(hat);
        bot.appendChild(hatBrim);

        // Name tag
        const tag = document.createElement('a-plane');
        tag.setAttribute('width', '0.2');
        tag.setAttribute('height', '0.05');
        tag.setAttribute('position', '-0.1 0.4 0.26');
        tag.setAttribute('color', '#fff');
        
        const nameText = document.createElement('a-text');
        nameText.setAttribute('value', this.name);
        nameText.setAttribute('color', '#000');
        nameText.setAttribute('align', 'center');
        nameText.setAttribute('scale', '0.15 0.15 0.15');
        nameText.setAttribute('position', '0 0 0.01');
        tag.appendChild(nameText);
        bot.appendChild(tag);

        // Arms
        const armL = document.createElement('a-cylinder');
        armL.setAttribute('id', `bot-${this.id}-arml`);
        armL.setAttribute('radius', '0.05');
        armL.setAttribute('height', '0.6');
        armL.setAttribute('position', '-0.3 0.3 0');
        armL.setAttribute('rotation', '0 0 45');
        armL.setAttribute('color', '#111');
        bot.appendChild(armL);

        const armR = document.createElement('a-cylinder');
        armR.setAttribute('id', `bot-${this.id}-armr`);
        armR.setAttribute('radius', '0.05');
        armR.setAttribute('height', '0.6');
        armR.setAttribute('position', '0.3 0.3 0');
        armR.setAttribute('rotation', '0 0 -45');
        armR.setAttribute('color', '#111');
        bot.appendChild(armR);

        return bot;
    }

    tick() {
        this.processAI();
        this.updateMovement();
    }

    processAI() {
        if(this.state === 'idle') {
            if(this.role === 'grill') {
                // Check if meat needs dropping
                let needsMeat = false;
                GameState.stations.grills.forEach(grill => {
                    // Logic to see if platens are empty would go here
                });
                
                // Wander around grill area naturally
                if(Math.random() < 0.01) {
                    this.targetPosition = { x: -4 + (Math.random()*4 - 2), y: 0, z: -4 };
                    this.state = 'moving';
                }
            } else if (this.role === 'fry') {
                if(Math.random() < 0.01) {
                    this.targetPosition = { x: 4 + (Math.random()*2 - 1), y: 0, z: -3 };
                    this.state = 'moving';
                }
            }
        }
    }

    updateMovement() {
        if(this.state === 'moving' && this.targetPosition) {
            const dx = this.targetPosition.x - this.position.x;
            const dz = this.targetPosition.z - this.position.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            
            if(dist < 0.1) {
                this.state = 'idle';
                this.targetPosition = null;
            } else {
                const dirX = dx / dist;
                const dirZ = dz / dist;
                this.position.x += dirX * this.speed;
                this.position.z += dirZ * this.speed;
                
                // Update rotation to face direction
                const angle = Math.atan2(dirX, dirZ) * (180 / Math.PI);
                this.el.setAttribute('rotation', `0 ${angle} 0`);
                this.el.setAttribute('position', `${this.position.x} ${this.position.y} ${this.position.z}`);
                
                // Bobbing animation
                const bob = Math.sin(Date.now() / 150) * 0.05;
                this.el.children[0].setAttribute('position', `0 ${0.7 + bob} 0`); // Move body cylinder
            }
        }
    }
}

    },
    onGrab: function() {
        this.data.vatIndex = -1; // Removed from vat
    },
    onDrop: function() {
        // Complex snapping logic to vat
        const pos = this.el.getAttribute('position');
        // Vats are roughly at x: 3, 3.8, 4.6 and z: -3.8
        const vatsPos = [3, 3.8, 4.6];
        let closestVat = -1;
        let minDist = 0.5; // Snap distance
        
        vatsPos.forEach((vx, index) => {
            const dist = Math.sqrt(Math.pow(pos.x - vx, 2) + Math.pow(pos.z - (-3.8), 2));
            if(dist < minDist) {
                minDist = dist;
                closestVat = index;
            }
        });

        if(closestVat !== -1) {
            // Snapped to vat!
            this.el.setAttribute('position', `${vatsPos[closestVat]} 1.2 -3.8`);
            this.el.setAttribute('rotation', '0 0 0');
            this.el.components['dynamic-body'].pause(); // Stop physics while in vat
            this.data.vatIndex = closestVat;
            
            if(this.state === 'raw') {
                this.state = 'cooking';
                this.cookTimer = MenuDatabase.ingredients.fries_raw.cookTime;
                ENGINE.log(`Basket placed in vat ${closestVat+1}. Commencing drop...`);
                // Auto drop animation simulation
                let dropY = 1.2;
                const dropAnim = setInterval(() => {
                    dropY -= 0.02;
                    this.el.setAttribute('position', `${vatsPos[closestVat]} ${dropY} -3.8`);
                    if(dropY <= 1.0) clearInterval(dropAnim);
                }, 30);
            }
        } else {
            this.el.components['dynamic-body'].play(); // Restore physics
        }
    },
    tick: function(time, timeDelta) {
        if(this.state === 'cooking') {
            this.cookTimer -= timeDelta/1000;
            if(this.cookTimer <= 0) {
                this.state = 'cooked';
                this.friesMesh.setAttribute('color', MenuDatabase.ingredients.fries_raw.cookedColor);
                ENGINE.log('Fries done. Duty alarm activated.', 'warn');
                // Play annoying beep sound
            }
        }
    },
    fillBasket: function() {
        if(this.state === 'empty') {
            this.state = 'raw';
            this.friesMesh.setAttribute('visible', 'true');
            this.friesMesh.setAttribute('color', MenuDatabase.ingredients.fries_raw.color);
        }
    }
});

// Dispenser for fries (Arch Fry Dispenser)
AFRAME.registerComponent('fry-dispenser', {
    init: function() {
        this.el.addEventListener('collide', (e) => {
            const el = e.detail.body.el;
            if(el.hasAttribute('fry-basket')) {
                // If basket collides with dispenser area and button is pressed
                el.components['fry-basket'].fillBasket();
            }
        });
    }
});


/**
 * WORLD BUILDER PROCEDURAL GENERATION
 */
function compileWorldGeometry(scene) {
    ENGINE.log("Executing Procedural Geometry Compilation...", "sys");
    
    // BUILD STORE LAYOUT
    const mapWidth = 20;
    const mapDepth = 20;
    
    // Detailed Tiled Floor (Instead of one large plane, make exact 1x1 ft tiles for immense detail)
    const floorEntity = document.createElement('a-entity');
    for(let x=-mapWidth/2; x<mapWidth/2; x+=0.3) { // 0.3m ~ 1ft tile
        for(let z=-mapDepth/2; z<mapDepth/2; z+=0.3) {
            const tile = document.createElement('a-plane');
            tile.setAttribute('position', `${x} 0.001 ${z}`);
            tile.setAttribute('rotation', '-90 0 0');
            tile.setAttribute('width', '0.28');
            tile.setAttribute('height', '0.28');
            // Checkered pattern with realistic kitchen colors (beige/terracotta)
            const isDark = (Math.round(x/0.3) + Math.round(z/0.3)) % 2 === 0;
            tile.setAttribute('color', isDark ? '#B39D82' : '#CFC4B5');
            floorEntity.appendChild(tile);
        }
    }
    scene.appendChild(floorEntity);
    
    // Structural Walls
    const wallColor = '#EEEEEE';
    const walls = [
        {pos: '0 2 10', w: 20, h: 4, d: 0.2}, // Back
        {pos: '0 2 -10', w: 20, h: 4, d: 0.2}, // Front
        {pos: '-10 2 0', w: 0.2, h: 4, d: 20}, // Left
        {pos: '10 2 0', w: 0.2, h: 4, d: 20}  // Right
    ];
    walls.forEach(w => {
        const wall = document.createElement('a-box');
        wall.setAttribute('position', w.pos);
        wall.setAttribute('width', w.w);
        wall.setAttribute('height', w.h);
        wall.setAttribute('depth', w.d);
        wall.setAttribute('color', wallColor);
        wall.setAttribute('static-body', '');
        scene.appendChild(wall);
    });

    // Drop Ceiling & Exhaust Hoods
    const ceiling = document.createElement('a-plane');
    ceiling.setAttribute('position', '0 4 0');
    ceiling.setAttribute('rotation', '90 0 0');
    ceiling.setAttribute('width', '20');
    ceiling.setAttribute('height', '20');
    ceiling.setAttribute('color', '#F5F5F5');
    scene.appendChild(ceiling);
    
    const hood = document.createElement('a-box');
    hood.setAttribute('position', '-2 3.5 -4');
    hood.setAttribute('width', '12');
    hood.setAttribute('height', '1');
    hood.setAttribute('depth', '3');
    hood.setAttribute('color', '#C0C0C0'); // Stainless steel hood
    scene.appendChild(hood);

    // BUILD STATIONS
    
    // 1. The Line (Assembly Table)
    const prepTable = document.createElement('a-box');
    prepTable.setAttribute('position', '0 0.9 -1.5');
    prepTable.setAttribute('width', '10');
    prepTable.setAttribute('height', '0.1');
    prepTable.setAttribute('depth', '1.2');
    prepTable.setAttribute('color', '#DDDDDD');
    prepTable.setAttribute('static-body', '');
    scene.appendChild(prepTable);
    
    const prepLegs = [-4.5, 0, 4.5];
    prepLegs.forEach(x => {
        const leg = document.createElement('a-cylinder');
        leg.setAttribute('position', `${x} 0.45 -1.5`);
        leg.setAttribute('radius', '0.05');
        leg.setAttribute('height', '0.9');
        leg.setAttribute('color', '#888');
        scene.appendChild(leg);
    });

    // 2. Garland Grill Area
    const grillHousings = document.createElement('a-entity');
    for(let g=0; g<2; g++) {
        const grillBase = document.createElement('a-box');
        grillBase.setAttribute('position', `${-5 + g*2.5} 0.5 -4`);
        grillBase.setAttribute('width', '2');
        grillBase.setAttribute('height', '1');
        grillBase.setAttribute('depth', '1.8');
        grillBase.setAttribute('color', '#333');
        grillBase.setAttribute('static-body', '');
        
        // Grill Platen Element (Hot Surface)
        const platen = document.createElement('a-box');
        platen.setAttribute('position', '0 0.51 0');
        platen.setAttribute('width', '1.8');
        platen.setAttribute('height', '0.02');
        platen.setAttribute('depth', '1.6');
        platen.setAttribute('color', '#1A1A1A'); // Scorched metal
        grillBase.appendChild(platen);
        
        // Upper Clamshell Mechanism
        const clamshell = document.createElement('a-box');
        clamshell.setAttribute('position', '0 0.8 -0.6');
        clamshell.setAttribute('width', '1.8');
        clamshell.setAttribute('height', '0.1');
        clamshell.setAttribute('depth', '0.8');
        clamshell.setAttribute('color', '#555');
        grillBase.appendChild(clamshell);

        grillHousings.appendChild(grillBase);
    }
    scene.appendChild(grillHousings);

    // 3. Fry Station (Vats and Dispenser)
    const fryStation = document.createElement('a-entity');
    const fryBase = document.createElement('a-box');
    fryBase.setAttribute('position', '3.8 0.5 -4');
    fryBase.setAttribute('width', '3');
    fryBase.setAttribute('height', '1');
    fryBase.setAttribute('depth', '1.5');
    fryBase.setAttribute('color', '#C0C0C0');
    fryBase.setAttribute('static-body', '');
    fryStation.appendChild(fryBase);

    // Create 3 Vats
    for(let v=0; v<3; v++) {
        const vatHole = document.createElement('a-box');
        vatHole.setAttribute('position', `${3 + v*0.8} 1 -3.8`);
        vatHole.setAttribute('width', '0.6');
        vatHole.setAttribute('height', '0.2');
        vatHole.setAttribute('depth', '0.9');
        vatHole.setAttribute('color', '#222'); // Oil color
        vatHole.setAttribute('class', 'fry-vat-zone');
        fryStation.appendChild(vatHole);

        // Spawn Baskets
        const basket = document.createElement('a-entity');
        basket.setAttribute('class', 'interactable fry-basket');
        basket.setAttribute('fry-basket', '');
        basket.setAttribute('position', `${3 + v*0.8} 1.25 -3.8`);
        basket.setAttribute('dynamic-body', 'shape: box; mass: 1');
        basket.setAttribute('grabbable', '');

        // Basket Mesh Construction (Wireframe look)
        const frame = document.createElement('a-box');
        frame.setAttribute('width', '0.3');
        frame.setAttribute('height', '0.2');
        frame.setAttribute('depth', '0.5');
        frame.setAttribute('color', '#888');
        frame.setAttribute('wireframe', 'true');
        basket.appendChild(frame);
        
        // Handle
        const handle = document.createElement('a-cylinder');
        handle.setAttribute('radius', '0.02');
        handle.setAttribute('height', '0.4');
        handle.setAttribute('position', '0 0.2 0.25');
        handle.setAttribute('rotation', '45 0 0');
        handle.setAttribute('color', '#111'); // Black plastic handle
        basket.appendChild(handle);

        fryStation.appendChild(basket);
    }

    // Arch Fry Dispenser
    const dispenser = document.createElement('a-box');
    dispenser.setAttribute('position', '5.5 1.5 -4');
    dispenser.setAttribute('width', '0.8');
    dispenser.setAttribute('height', '1');
    dispenser.setAttribute('depth', '1');
    dispenser.setAttribute('color', '#DDD');
    dispenser.setAttribute('static-body', '');
    
    // Dispenser Hopper
    const hopper = document.createElement('a-cone');
    hopper.setAttribute('position', '0 0.8 0');
    hopper.setAttribute('radius-bottom', '0.4');
    hopper.setAttribute('radius-top', '0.8');
    hopper.setAttribute('height', '0.6');
    hopper.setAttribute('rotation', '180 0 0');
    hopper.setAttribute('color', '#FFFDD0'); // Full of raw fries
    dispenser.appendChild(hopper);
    
    // Dispenser trigger area
    const trigger = document.createElement('a-box');
    trigger.setAttribute('position', '0 -0.6 0');
    trigger.setAttribute('width', '0.5');
    trigger.setAttribute('height', '0.2');
    trigger.setAttribute('depth', '0.5');
    trigger.setAttribute('visible', 'false');
    trigger.setAttribute('static-body', 'isTrigger: true');
    trigger.setAttribute('fry-dispenser', '');
    dispenser.appendChild(trigger);

    fryStation.appendChild(dispenser);
    scene.appendChild(fryStation);

    // 4. Raw Ingredients Physics Objects Spawner (Patties, Buns)
    const meatFreezer = document.createElement('a-box');
    meatFreezer.setAttribute('position', '-7 0.8 -2');
    meatFreezer.setAttribute('width', '1');
    meatFreezer.setAttribute('height', '1.6');
    meatFreezer.setAttribute('depth', '1');
    meatFreezer.setAttribute('color', '#B0E0E6');
    meatFreezer.setAttribute('static-body', '');
    scene.appendChild(meatFreezer);

    // Spawn stack of 10:1 patties
    for(let p=0; p<20; p++) {
        const patty = document.createElement('a-cylinder');
        patty.setAttribute('class', 'interactable meat-101');
        patty.setAttribute('position', `-7 ${1.7 + (p*0.02)} -2`);
        patty.setAttribute('radius', '0.12');
        patty.setAttribute('height', '0.015');
        patty.setAttribute('color', MenuDatabase.ingredients.patty_101.color);
        patty.setAttribute('dynamic-body', `mass: ${MenuDatabase.ingredients.patty_101.mass}`);
        patty.setAttribute('grabbable', '');
        scene.appendChild(patty);
    }

    ENGINE.log("Procedural Geometry Complete.", "sys");
}

/**
 * APPLICATION ENTRY POINT
 */
document.addEventListener('DOMContentLoaded', () => {
    // Artificial load delay to allow DOM parsing and simulate heavy asset loading
    ENGINE.log("Boot sequence initiated.", "sys");
    
    let sysCheck = 0;
    const loadInt = setInterval(() => {
        sysCheck += Math.random() * 5;
        document.getElementById('loader').style.width = Math.min(sysCheck, 100) + '%';
        if(sysCheck > 20) document.getElementById('load-text').innerText = "Loading CANNON.js Physics Matrix...";
        if(sysCheck > 50) document.getElementById('load-text').innerText = "Generating 4K Tiled Meshes...";
        if(sysCheck > 80) document.getElementById('load-text').innerText = "Compiling Bot AI State Machines...";

        if(sysCheck >= 100) {
            clearInterval(loadInt);
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 1000);
            
            // Init Systems
            const scene = document.querySelector('a-scene');
            if(scene.hasLoaded) {
                compileWorldGeometry(scene);
                GameState.init();
                AIController.init();
            } else {
                scene.addEventListener('loaded', () => {
                    compileWorldGeometry(scene);
                    GameState.init();
                    AIController.init();
                });
            }
        }
    }, 100);
});

    </script>
</head>
<body>

    <!-- MASSIVE HTML HUD STRUCTURE -->
    <div id="loading-screen">
        <div class="m-logo">M</div>
        <div class="loader-bar"><div id="loader" class="loader-fill"></div></div>
        <div id="load-text" class="loading-text">Initializing McDonald's OS Kernal...</div>
    </div>

    <div id="global-hud">
        
        <div id="top-bar">
            <div class="stat-box" id="score-display">Orders: 0 | Waste: $0.00</div>
            <div class="clock" id="clock-display">12:00 PM</div>
        </div>

        <div id="kvs-container">
            <!-- Tickets are dynamically inserted here by GameState -->
        </div>

        <!-- Grill HUD Specifics -->
        <div id="grill-ui" class="panel">
            <div class="panel-header">GARLAND GRILL CONTROL</div>
            <div class="platen-grid">
                <div class="platen">
                    <div style="font-size:1.5rem; font-weight:bold; color:#0f0;">425°F</div>
                    <div class="platen-status">PLATEN 1 (LEFT)</div>
                    <button class="platen-btn">LOWER</button>
                </div>
                <div class="platen">
                    <div style="font-size:1.5rem; font-weight:bold; color:#0f0;">425°F</div>
                    <div class="platen-status">PLATEN 1 (RIGHT)</div>
                    <button class="platen-btn">LOWER</button>
                </div>
            </div>
        </div>

        <!-- Fry HUD Specifics -->
        <div id="fry-ui" class="panel">
            <div class="panel-header">PITCO FRY VAT SYSTEM</div>
            <div class="vat-row">
                <div class="vat-title"><span>VAT 1 (FRIES)</span> <span id="vat-1-temp" class="vat-temp">330°F</span></div>
                <div class="vat-bar-bg"><div class="vat-bar-fill" style="width: 100%; background: #0f0;"></div></div>
            </div>
            <div class="vat-row">
                <div class="vat-title"><span>VAT 2 (FRIES)</span> <span id="vat-2-temp" class="vat-temp">335°F</span></div>
                <div class="vat-bar-bg"><div class="vat-bar-fill" style="width: 100%; background: #0f0;"></div></div>
            </div>
            <div class="vat-row">
                <div class="vat-title"><span>VAT 3 (HASHBROWNS)</span> <span id="vat-3-temp" class="vat-temp cold">330°F</span></div>
                <div class="vat-bar-bg"><div class="vat-bar-fill" style="width: 60%; background: #fa0;"></div></div>
            </div>
        </div>
        
        <!-- Deep Internal Debugger -->
        <div id="dev-console">
            <div style="border-bottom: 1px dashed #0f0; margin-bottom: 5px; padding-bottom: 5px;">MCD_OS v11.9 DBG_TERM OUT>></div>
            <div id="debug-output"></div>
        </div>

    </div>

    <!-- VR SCENE GRAPH -->
    <a-scene physics="debug: false; gravity: -9.8" renderer="colorManagement: true; physicallyCorrectLights: true;">
        <a-assets>
            <a-mixin id="grab" grabbable dynamic-body></a-mixin>
            <a-mixin id="touch" sphere-collider="objects: .interactable"></a-mixin>
        </a-assets>

        <!-- Lighting Profile - Fluorescent Overheads -->
        <a-light type="ambient" color="#FFFFFF" intensity="0.6"></a-light>
        <a-light type="point" position="-5 3.5 -5" color="#FFFDD0" intensity="0.5" distance="10" castShadow="true"></a-light>
        <a-light type="point" position="5 3.5 -5" color="#FFFDD0" intensity="0.5" distance="10"></a-light>
        <a-light type="point" position="0 3.5 0" color="#FFFDD0" intensity="0.5" distance="10"></a-light>

        <!-- Player Rig Setup for Super-Hands VR Interaction -->
        <a-entity id="player-rig" position="0 0 2" movement-controls="fly: false; speed: 0.15" kinematic-body>
            <a-entity id="head" camera position="0 1.6 0" look-controls="pointerLockEnabled: true">
                <a-entity cursor="rayOrigin: mouse" raycaster="objects: .interactable"></a-entity>
            </a-entity>
            <!-- Hands -->
            <a-entity id="left-hand" mixin="touch" super-hands hand-controls="hand: left"></a-entity>
            <a-entity id="right-hand" mixin="touch" super-hands hand-controls="hand: right"></a-entity>
        </a-entity>

    </a-scene>

</body>
